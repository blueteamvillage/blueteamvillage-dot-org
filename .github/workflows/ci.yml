name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      # No Contentful/Upstash secrets in CI: the app builds against the
      # bundled fallback content when CONTENTFUL_SPACE_ID is unset.
      - run: npm run build
        env:
          AUTH_SECRET: ci-build-only-secret
