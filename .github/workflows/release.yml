name: Release

on:
  # Cut a release from the Actions tab: enter a version like v1.2.0
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true
  # Or push a tag: git tag v1.0.0 && git push origin v1.0.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version input
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s' "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "Version must look like v1.2.3 (got: $VERSION)" >&2
            exit 1
          fi

      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          # For workflow_dispatch the tag doesn't exist yet — gh creates it
          # at the current commit. For tag pushes the tag already exists.
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --target "$GITHUB_SHA"
